# Disabled for fork: requires PYPI_TOKEN secret.
# Enable if you configure PyPI publishing.
name: Python package
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g., v0.2.0)"
        required: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: Extract and verify version
        id: version
        run: |
          TAG_VERSION="${{ github.event.inputs.tag }}"
          echo "Tag version: $TAG_VERSION"
          PYPROJECT_VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "pyproject.toml version: $PYPROJECT_VERSION"
          if [ "$TAG_VERSION" != "v$PYPROJECT_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match pyproject.toml version (v$PYPROJECT_VERSION)"
            exit 1
          fi
          echo "Version verification passed!"
          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT
      - name: Build package
        run: |
          uv build
      - name: Publish package
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          uv publish --token "$PYPI_TOKEN"